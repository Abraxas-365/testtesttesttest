# Full-stack Task Manager: Go API + React/nginx frontend.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # The SQLite database lives in /data (named volume) for persistence.
    volumes:
      - api-data:/data
    healthcheck:
      # busybox wget ships in the alpine runtime image.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/tasks"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  api-data:
